<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Note</title>
<script>
  const isWebKit = window.webkit?.messageHandlers?.live;
  const isWebView2 = window.chrome?.webview;

  function send(msg) {
    if (isWebKit) window.webkit.messageHandlers.live.postMessage(msg);
    else if (isWebView2) window.chrome.webview.postMessage(msg);
  }

  function save() {
    const note = document.getElementById('note').value;
    send({ method: "close_and_send", params: [JSON.stringify({ action: "save", note })] });
  }

  function discard() {
    send({ method: "close_and_send", params: [JSON.stringify({ action: "discard" })] });
  }

  window.onload = () => {
    const note = __NOTE__;
    const label = __LABEL__;
    document.getElementById('label').textContent = label;
    document.getElementById('note').value = note;
    document.getElementById('note').focus();

    // Ctrl+S / Cmd+S pour sauvegarder
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        save();
      }
      if (e.key === 'Escape') discard();
    });

    // Compteur de caractères
    const counter = document.getElementById('counter');
    const textarea = document.getElementById('note');
    const update = () => counter.textContent = `${textarea.value.length} chars`;
    textarea.addEventListener('input', update);
    update();
  };
</script>
<style>
  :root {
    --bg: #282828; --panel: #333; --border: #1e1e1e;
    --text: #d4d4d4; --subtle: #777; --accent: #ff7c00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    font-size: 13px; height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    padding: 12px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  header h1 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); }
  #label { font-size: 12px; color: var(--subtle); margin-left: auto; }
  textarea {
    flex: 1; background: var(--bg); color: var(--text);
    border: none; outline: none; resize: none;
    padding: 16px; font-size: 13px; line-height: 1.6;
    font-family: inherit;
  }
  textarea::placeholder { color: var(--subtle); }
  footer {
    padding: 10px 16px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  #counter { color: var(--subtle); font-size: 11px; margin-right: auto; }
  .hint { color: var(--subtle); font-size: 11px; }
  button {
    border: none; padding: 5px 14px; font-size: 12px;
    font-weight: 600; cursor: pointer; border-radius: 2px;
  }
  .btn-save { background: var(--accent); color: #000; }
  .btn-save:hover { opacity: 0.85; }
  .btn-discard { background: var(--panel); color: var(--subtle); }
  .btn-discard:hover { color: var(--text); }
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <h1>Session Note</h1>
  <span id="label"></span>
</header>
<textarea
  id="note"
  placeholder="What are you working on? What's next? What's not working yet?&#10;&#10;This note stays with this session."></textarea>
<footer>
  <span id="counter"></span>
  <span class="hint">⌘S to save · Esc to close</span>
  <button class="btn-discard" onclick="discard()">Cancel</button>
  <button class="btn-save" onclick="save()">Save</button>
</footer>
</body>
</html>
